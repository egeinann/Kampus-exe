workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS (no code signing)
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app